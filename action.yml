name: ai-admissibility-action
description: External admission gate for GitHub Actions before execution
author: Pin Floyd
branding:
  icon: shield
  color: purple
inputs:
  authority-url:
    description: External authority endpoint URL.
    required: false
  authority-pubkey:
    description: Pinned authority public key.
    required: false
  policy-id:
    description: Policy identifier.
    required: false
  trust-verdict:
    description: Runtime trust verdict. Must be PASS.
    required: false
  proof-access-id:
    description: "Temporary proof access id for the self-guided proof-access bridge."
    required: true
runs:
  using: composite
  steps:
    - name: Validate proof access id
      shell: bash
      run: |
        if [ -z "${{ inputs.proof-access-id }}" ]; then
          echo "proof-access-id is required"
          exit 1
        fi
        if [ "${{ inputs.proof-access-id }}" = "YOUR_PROOF_ACCESS_ID" ] || [ "${{ inputs.proof-access-id }}" = "placeholder" ] || [ "${{ inputs.proof-access-id }}" = "TODO" ]; then
          echo "proof-access-id must not be a placeholder"
          exit 1
        fi
    - name: Preflight gate
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $authorityUrl = '${{ inputs.authority-url }}'
        $authorityPubkey = '${{ inputs.authority-pubkey }}'
        $policyId = '${{ inputs.policy-id }}'
        $trustVerdict = '${{ inputs.trust-verdict }}'
        if ([string]::IsNullOrWhiteSpace($authorityUrl)) { Write-Error "FAIL_CLOSED: authority-url is missing"; exit 1 }
        if ([string]::IsNullOrWhiteSpace($authorityPubkey)) { Write-Error "FAIL_CLOSED: authority-pubkey is missing"; exit 1 }
        if ([string]::IsNullOrWhiteSpace($policyId)) { Write-Error "FAIL_CLOSED: policy-id is missing"; exit 1 }
        if ([string]::IsNullOrWhiteSpace($trustVerdict)) { Write-Error "FAIL_CLOSED: trust-verdict is missing"; exit 1 }
        if ($authorityUrl -eq 'https://admit.ai-admissibility.com') { Write-Error "FAIL_CLOSED: placeholder authority-url is not allowed"; exit 1 }
        if ($authorityPubkey -eq 'example-pubkey-placeholder') { Write-Error "FAIL_CLOSED: placeholder authority-pubkey is not allowed"; exit 1 }
        if ($policyId -eq 'example-policy') { Write-Error "FAIL_CLOSED: placeholder policy-id is not allowed"; exit 1 }
        if ($trustVerdict -ne 'PASS') { Write-Error "FAIL_CLOSED: trust-verdict must be PASS"; exit 1 }
        Write-Error "FAIL_CLOSED: runtime authority integration is not wired yet"
        exit 1
